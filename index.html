    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Max-Regular"', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                900: '#0c4a6e',
              },
              border: "var(--border)",
              input: "var(--input)",
              ring: "var(--ring)",
              background: "var(--background)",
              foreground: "var(--foreground)",
              destructive: {

            }

    <style>
      /* 
       * Configuração para a fonte Max-Regular.
       * O browser irá procurar a fonte localmente.
       */
      @font-face {
        font-family: 'Max-Regular';
        src: local('Max-Regular'), local('Max Regular');
        font-weight: 400;
        font-style: normal;
      }

      :root {
        --background: #ffffff;
        --foreground: #0f172a;
        --border: #e2e8f0;
        --input: #e2e8f0;
        --ring: #0284c7;
        --destructive: #ef4444;
        --destructive-foreground: #ffffff;
      }
      
      .dark {
        --background: #020617;
        --foreground: #f8fafc;
        --border: #1e293b;
        --input: #1e293b;
        --ring: #0ea5e9;
        --destructive: #7f1d1d;
        --destructive-foreground: #f8fafc;
      }

      body {
        background-color: var(--background);
        color: var(--foreground);
        font-family: 'Max-Regular', sans-serif;
      }
      
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
    </style>
